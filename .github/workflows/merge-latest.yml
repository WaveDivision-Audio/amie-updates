name: Merge Update Manifests

# Merges latest-darwin.json + latest-windows.json from a release
# into a single latest.json for the Tauri auto-updater.
#
# Triggers automatically when you click "Publish" on a release.
# Can also be run manually via CLI:
#   gh workflow run merge-latest.yml -f tag=v1.0.0-beta.23
#
# NOTE: This workflow must live in the repo that hosts your releases.
#       If releases are in a separate repo (e.g. targetlevel-updates),
#       copy this file to that repo's .github/workflows/ directory.

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: ""
        required: false
        type: string
      allow_partial:
        description: "Allow merging with only one platform manifest (skip the both-required check)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  merge:
    name: Merge platform manifests
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "No tag provided, finding latest published release..."
            TAG=$(gh release list --repo "${{ github.repository }}" --json tagName,isDraft \
              --jq '.[] | select(.isDraft | not) | .tagName' | head -1)
            if [ -z "$TAG" ]; then
              echo "::error::No release found and no tag provided"
              exit 1
            fi
            echo "Found release: $TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Merging manifests for **$TAG**" >> "$GITHUB_STEP_SUMMARY"

      - name: Download platform manifests
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          ALLOW_PARTIAL: ${{ github.event_name == 'release' || inputs.allow_partial }}
        run: |
          mkdir -p /tmp/manifests
          HAVE_DARWIN=false
          HAVE_WINDOWS=false

          if gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "latest-darwin.json" --dir /tmp/manifests 2>/dev/null; then
            HAVE_DARWIN=true
            echo "Downloaded latest-darwin.json"
          else
            echo "::warning::latest-darwin.json not found in release $TAG"
          fi

          if gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "latest-windows.json" --dir /tmp/manifests 2>/dev/null; then
            HAVE_WINDOWS=true
            echo "Downloaded latest-windows.json"
          else
            echo "::warning::latest-windows.json not found in release $TAG"
          fi

          # Fail if neither file exists
          if [ "$HAVE_DARWIN" = false ] && [ "$HAVE_WINDOWS" = false ]; then
            echo "::error::Neither latest-darwin.json nor latest-windows.json found in $TAG"
            exit 1
          fi

          # Fail if only one platform found (unless allow_partial is set)
          if [ "$HAVE_DARWIN" = false ] || [ "$HAVE_WINDOWS" = false ]; then
            MISSING="latest-darwin.json"
            [ "$HAVE_DARWIN" = true ] && MISSING="latest-windows.json"

            if [ "$ALLOW_PARTIAL" = "true" ]; then
              echo "::warning::$MISSING is missing but allow_partial is set — continuing with one platform"
            else
              echo "::error::$MISSING is missing from release $TAG. Both platform manifests are required."
              echo "::error::Upload the missing file and re-publish, or re-run with allow_partial=true to skip this check."
              exit 1
            fi
          fi

          echo "have_darwin=$HAVE_DARWIN" >> "$GITHUB_OUTPUT"
          echo "have_windows=$HAVE_WINDOWS" >> "$GITHUB_OUTPUT"

      - name: Merge into latest.json
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const dir = '/tmp/manifests';

            const haveDarwin = '${{ steps.download.outputs.have_darwin }}' === 'true';
            const haveWindows = '${{ steps.download.outputs.have_windows }}' === 'true';

            function loadAndValidate(filePath, label) {
              const raw = fs.readFileSync(filePath, 'utf-8');
              let data;
              try {
                data = JSON.parse(raw);
              } catch (e) {
                core.setFailed(`${label} contains invalid JSON: ${e.message}`);
                process.exit(1);
              }

              if (!data.version) {
                core.setFailed(`${label} is missing required "version" field`);
                process.exit(1);
              }
              if (!data.platforms || typeof data.platforms !== 'object' || Object.keys(data.platforms).length === 0) {
                core.setFailed(`${label} has no "platforms" entries`);
                process.exit(1);
              }
              for (const [name, entry] of Object.entries(data.platforms)) {
                if (!entry.signature) {
                  core.setFailed(`${label} platform "${name}" is missing "signature"`);
                  process.exit(1);
                }
                if (!entry.url) {
                  core.setFailed(`${label} platform "${name}" is missing "url"`);
                  process.exit(1);
                }
              }
              return data;
            }

            let base = null;
            const platforms = {};

            if (haveDarwin) {
              const data = loadAndValidate(`${dir}/latest-darwin.json`, 'latest-darwin.json');
              if (!base) base = data;
              Object.assign(platforms, data.platforms);
              core.info(`darwin platforms: ${Object.keys(data.platforms).join(', ')}`);
            }

            if (haveWindows) {
              const data = loadAndValidate(`${dir}/latest-windows.json`, 'latest-windows.json');
              if (!base) base = data;
              Object.assign(platforms, data.platforms);
              core.info(`windows platforms: ${Object.keys(data.platforms).join(', ')}`);
            }

            const merged = {
              version: base.version,
              notes: base.notes,
              pub_date: base.pub_date,
              platforms,
            };

            const json = JSON.stringify(merged, null, 2) + '\n';
            fs.writeFileSync(`${dir}/latest.json`, json);

            core.info('--- merged latest.json ---');
            core.info(json);
            core.info(`Platforms: ${Object.keys(platforms).join(', ')}`);

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          gh release upload "$TAG" /tmp/manifests/latest.json \
            --repo "${{ github.repository }}" --clobber
          echo "latest.json uploaded to $TAG"

      - name: Summary
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/manifests/latest.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "latest.json has been uploaded to the release." >> "$GITHUB_STEP_SUMMARY"
